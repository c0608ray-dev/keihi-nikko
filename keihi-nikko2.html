<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>経費日航 - 軽貨物ドライバー経費管理</title>
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--border:#2d333b;
  --accent:#0ea5e9;--accent2:#38bdf8;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--purple:#a78bfa;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-title{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.header-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.year-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:13px;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding-bottom:80px;}
.section{margin:14px 14px 0;}
.slabel{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
.slabel.purple{color:var(--purple);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.card.home{border-color:#4c1d95;}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.form-group{flex:1;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:var(--accent);}
textarea{resize:none;height:60px;font-size:13px;}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.cat-group-label{grid-column:1/-1;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;padding:6px 0 3px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.cat-chip{padding:10px 8px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:12px;color:var(--text2);}
.cat-chip.sel{border-color:var(--accent);background:#0c2033;color:var(--accent2);font-weight:700;}
.cat-chip.sel.home{border-color:var(--purple);background:#2e1065;color:var(--purple);}
.cat-chip .ci{font-size:18px;display:block;margin-bottom:3px;}
.btn{width:100%;padding:13px;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn:active{opacity:0.7;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-green{background:#14532d;color:var(--green);border:1px solid #166534;}
.eitem{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.eitem:last-child{border-bottom:none;}
.eicon{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.einfo{flex:1;min-width:0;}
.etitle{font-size:14px;font-weight:600;color:var(--text);}
.emeta{font-size:11px;color:var(--text2);margin-top:2px;}
.eamt{text-align:right;flex-shrink:0;}
.eamt-val{font-size:15px;font-weight:700;color:var(--text);}
.eamt-ded{font-size:11px;color:var(--green);margin-top:1px;}
.eamt-ded.purple{color:var(--purple);}
.edel{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.scard.full{grid-column:1/-1;}
.scard.hl{border-color:var(--accent);background:#0c1f2e;}
.scard.hlp{border-color:var(--purple);background:#1e0a3c;}
.slb{font-size:11px;color:var(--text2);margin-bottom:6px;}
.sval{font-size:20px;font-weight:700;color:var(--text);}
.sval.ac{color:var(--accent2);}
.sval.gr{color:var(--green);}
.sval.pu{color:var(--purple);}
.ssub{font-size:11px;color:var(--text2);margin-top:3px;}
.abox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.abox.home{border-color:#4c1d95;background:#12082a;}
.atitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.arow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.arow:last-child{border-bottom:none;}
.albl{color:var(--text2);}
.aval{font-weight:600;color:var(--text);}
.aval.gr{color:var(--green);}
.aval.pu{color:var(--purple);}
.pbar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:8px 0;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width 0.5s;}
.pfill.pu{background:linear-gradient(90deg,#7c3aed,var(--purple));}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.mlbl{font-size:16px;font-weight:700;color:var(--text);}
.mbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:14px;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:13px;line-height:1.8;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;}
.modal-box{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px 16px 36px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text);}
.mclose{float:right;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;}
.fab{position:fixed;bottom:24px;right:calc(50% - 228px);background:var(--accent);color:#fff;border:none;border-radius:50px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(14,165,233,0.4);z-index:50;display:flex;align-items:center;gap:8px;font-family:inherit;}
@media(max-width:480px){.fab{right:16px;}}
.srow{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.srow:last-child{border-bottom:none;}
.srlbl{font-size:14px;color:var(--text);}
.srsub{font-size:11px;color:var(--text2);margin-top:2px;}
.sinput{width:110px;text-align:right;}
.depr-box{background:#1e0a3c;border:1px solid #4c1d95;border-radius:8px;padding:12px 14px;margin-top:8px;}
.depr-lbl{font-size:11px;color:var(--purple);margin-bottom:4px;}
.depr-val{font-size:20px;font-weight:700;color:var(--purple);}
.depr-sub{font-size:11px;color:var(--text2);margin-top:3px;}
.warn-box{background:#1a0a00;border:1px solid #92400e;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--yellow);margin-bottom:10px;}
.import-box{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:border-color 0.2s;}
.import-box:hover{border-color:var(--accent);}
.import-success{border-color:var(--green);background:#0a1f0a;}
.loan-result{background:#0c1f2e;border:1px solid var(--accent);border-radius:8px;padding:14px;margin-top:10px;}
.loan-result-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.loan-result-row:last-child{border-bottom:none;}
.loan-result-lbl{color:var(--text2);}
.loan-result-val{font-weight:700;color:var(--text);}
.loan-result-val.hi{color:var(--accent2);font-size:18px;}
.loan-add-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;letter-spacing:1px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="header">
  <div><div class="header-title">⛽ 経費日航</div><div class="header-sub">軽貨物ドライバー経費管理</div></div>
  <select class="year-select" id="yearSel" onchange="changeYear()"></select>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">経費入力</div>
  <div class="tab" onclick="switchTab('pl')">損益</div>
  <div class="tab" onclick="switchTab('summary')">年次集計</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>
<div class="content" id="content"></div>
<button class="fab" id="fab" onclick="openModal()">＋ 経費を追加</button>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">経費を追加 <button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">日付</label><input type="date" id="fd"></div>
      <div class="form-group"><label class="form-label">金額（円）</label><input type="number" id="fa" placeholder="0"></div>
    </div>
    <label class="form-label">カテゴリ</label>
    <div class="cats" id="chips"></div>
    <label class="form-label">メモ（任意）</label>
    <textarea id="fm" placeholder="例：○○GS、固定資産税第1期など"></textarea>
    <div style="height:12px"></div>
    <button class="btn btn-primary" onclick="addExp()">追加する</button>
  </div>
</div>

<script>
const GROUPS=[
  {label:'🚗 車両・通信費',cats:[
    {key:'gas',     icon:'⛽',label:'ガソリン代',      type:'car',  kamoku:'車両費',     zei:'課対仕入10%'},
    {key:'etc',     icon:'🛣', label:'高速・ETC',      type:'car',  kamoku:'旅費交通費', zei:'課対仕入10%'},
    {key:'parking', icon:'🅿️',label:'駐車場代',       type:'car',  kamoku:'旅費交通費', zei:'課対仕入10%'},
    {key:'vehicle', icon:'🔧',label:'車両維持費',      type:'car',  kamoku:'車両費',     zei:'課対仕入10%'},
    {key:'carloan', icon:'💳',label:'車両ローン利息',  type:'full', kamoku:'利子割引料', zei:'非課税'},
    {key:'carins',  icon:'🛡',label:'任意保険',        type:'car',  kamoku:'損害保険料', zei:'非課税'},
    {key:'phone',   icon:'📱',label:'通信費（スマホ）', type:'phone',kamoku:'通信費',     zei:'課対仕入10%'},
    {key:'net',     icon:'🌐',label:'ネット回線',       type:'net',  kamoku:'通信費',     zei:'課対仕入10%'},
    {key:'other',   icon:'📦',label:'その他',           type:'full', kamoku:'雑費',       zei:'課対仕入10%'},
  ]},
  {label:'🏠 自宅経費（持ち家）',cats:[
    {key:'loan',    icon:'🏠',label:'ローン利息',  type:'home', kamoku:'利子割引料', zei:'非課税'},
    {key:'ftax',    icon:'📋',label:'固定資産税',  type:'home', kamoku:'租税公課',   zei:'対象外'},
    {key:'finsure', icon:'🔥',label:'火災保険料',  type:'home', kamoku:'損害保険料', zei:'非課税'},
    {key:'elec',    icon:'💡',label:'電気代',      type:'home', kamoku:'水道光熱費', zei:'課対仕入10%'},
  ]}
];
const ALL=GROUPS.flatMap(g=>g.cats);
const HOME_KEYS=['loan','ftax','finsure'];

const SK='keihi-v3-exp',STK='keihi-v3-st',SIK='keihi-v3-inc',SLK='keihi-v3-loan',SNK='keihi-v3-nichiho',SBK='keihi-v3-booth';
function ld(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){if(e.name==='QuotaExceededError'||e.code===22){alert('⚠️ 保存容量がいっぱいです。\n古いデータをエクスポートして削除してください。');}return false;}}

let expenses=ld(SK,[]);
let incomes=ld(SIK,{});// {YYYY-MM: 金額}
let loanCfg=ld(SLK,{totalRepayment:0,financeCharge:0,numPayments:48,firstPayment:0,monthlyPayment:0,startYearMonth:''});
let nichihoData=ld(SNK,null);// 配送日報アプリのJSONデータ
let boothData=ld(SBK,null);// BOOTH売上日報のJSONデータ
let cfg=ld(STK,{carRatio:80,phoneRatio:50,netRatio:70,haisoData:null,totalKm:0,
  totalFloor:0,officeFloor:0,parkingFloor:0,
  buildingCost:0,buildingStructure:'wood',buildingYear:2000});

let tab='input',curMonth=tod().slice(0,7),curYear=tod().slice(0,4),selCat='gas';
function tod(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ── 按分計算 ──
function carAnbun(){
  let bKm=0,tKm=cfg.totalKm||0;
  if(cfg.haisoData){
    (cfg.haisoData.records||[]).filter(r=>r.date&&r.date.startsWith(curYear)).forEach(r=>{
      if(r.odometerStart&&r.odometerEnd)bKm+=parseFloat(r.odometerEnd)-parseFloat(r.odometerStart);
    });
    tKm=Math.max(tKm,bKm);
  }
  const ratio=tKm>0&&bKm>0?Math.min(100,Math.round(bKm/tKm*100)):cfg.carRatio;
  return{bKm:Math.round(bKm),tKm:Math.round(tKm),ratio};
}
function homeAnbun(){
  const{totalFloor:tf,officeFloor:of,parkingFloor:pf}=cfg;
  return{
    office:tf>0&&of>0?Math.min(100,Math.round(of/tf*100)):0,
    parking:tf>0&&pf>0?Math.min(100,Math.round(pf/tf*100)):0
  };
}
function calcDepr(){
  const{buildingCost:bc,buildingStructure:bs,officeFloor:of,totalFloor:tf}=cfg;
  if(!bc||!of||!tf)return 0;
  const rates={wood:0.046,steel:0.038,rc:0.022};
  return Math.floor(bc*0.9*(rates[bs]||0.046)*(of/tf));
}
function anbunRatio(cat){
  if(cat==='other'||cat==='carloan')return 100;
  if(cat==='phone')return cfg.phoneRatio;
  if(cat==='net')return cfg.netRatio;
  if(HOME_KEYS.includes(cat))return homeAnbun().office;
  return carAnbun().ratio;
}
function getCat(key){return ALL.find(c=>c.key===key)||ALL.find(c=>c.key==='other');}

// ── INIT ──
function initYear(){
  const sel=document.getElementById('yearSel'),yr=new Date().getFullYear();
  for(let y=yr;y>=yr-3;y--){const o=document.createElement('option');o.value=y;o.textContent=y+'年';if(String(y)===curYear)o.selected=true;sel.appendChild(o);}
}
function changeYear(){curYear=document.getElementById('yearSel').value;curMonth=curYear+'-'+curMonth.slice(5);render();}

function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['input','pl','summary','settings'][i]===t));
  document.getElementById('fab').style.display=t==='input'?'flex':'none';
  render();
}

function render(){
  const c=document.getElementById('content');c.innerHTML='';
  if(tab==='input')rInput(c);
  else if(tab==='pl')rPL(c);
  else if(tab==='summary')rSummary(c);
  else rSettings(c);
}

// ── INPUT ──
function rInput(c){
  const nav=mk('div','mnav');
  nav.append(mbtn('＜',()=>shiftM(-1)),mk('div','mlbl',curMonth.replace('-','年')+'月'),mbtn('＞',()=>shiftM(1)));
  c.appendChild(nav);

  const mexp=expenses.filter(e=>e.date.startsWith(curMonth)).sort((a,b)=>b.date.localeCompare(a.date));
  if(!mexp.length){c.appendChild(emptyEl('📋','この月の経費がありません\n右下の＋から追加'));return;}

  const card=mk('div','card');
  mexp.forEach(e=>{
    const cat=getCat(e.cat),ratio=anbunRatio(e.cat),ded=Math.floor(e.amount*ratio/100),isH=HOME_KEYS.includes(e.cat);
    const item=mk('div','eitem');
    item.innerHTML=`<div class="eicon">${cat.icon}</div><div class="einfo"><div class="etitle">${cat.label}</div><div class="emeta">${e.date}${e.memo?' 　'+e.memo:''} <span style="font-size:10px;color:${isH?'var(--purple)':'var(--accent2)'}">[按分${ratio}%]</span></div></div><div class="eamt"><div class="eamt-val">¥${e.amount.toLocaleString()}</div><div class="eamt-ded ${isH?'purple':''}">控除 ¥${ded.toLocaleString()}</div></div><button class="edel" onclick="delExp('${e.id}')">✕</button>`;
    card.appendChild(item);
  });
  const total=mexp.reduce((s,e)=>s+e.amount,0),dedTot=mexp.reduce((s,e)=>s+Math.floor(e.amount*anbunRatio(e.cat)/100),0);
  const foot=mk('div','');foot.style.cssText='padding:12px 14px;background:#0c1f2e;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center';
  foot.innerHTML=`<span style="font-size:13px;color:var(--text2)">${mexp.length}件</span><div style="text-align:right"><div style="font-size:16px;font-weight:700">¥${total.toLocaleString()}</div><div style="font-size:11px;color:var(--green)">控除 ¥${dedTot.toLocaleString()}</div></div>`;
  card.appendChild(foot);
  const sec=mk('div','section');sec.appendChild(card);c.appendChild(sec);
}

// ── P&L ──
function rPL(c){
  const nav=mk('div','mnav');
  nav.innerHTML=`<div class="mlbl">${curYear}年 月次損益</div>`;
  c.appendChild(nav);

  const months=[];
  for(let m=1;m<=12;m++)months.push(curYear+'-'+String(m).padStart(2,'0'));

  let yearIncome=0,yearExp=0;

  // haisonikkoから月別売上を自動取得
  const haisoIncome={};
  if(cfg.haisoData&&cfg.haisoData.records){
    cfg.haisoData.records.filter(r=>r.date&&r.date.startsWith(curYear)).forEach(r=>{
      const mon=r.date.slice(0,7);
      const earn=parseFloat(r.itemAmount||0);
      if(earn>0)haisoIncome[mon]=(haisoIncome[mon]||0)+earn;
    });
  }

  const sec=mk('div','section');

  months.forEach(month=>{
    const mexp=expenses.filter(e=>e.date.startsWith(month));
    const mDed=mexp.reduce((s,e)=>s+Math.floor(e.amount*anbunRatio(e.cat)/100),0);
    // 優先順位：①日報アプリ入金確認済み > ②haisonikko合計 > ③手入力
    const nichihoIncome=getNichihoIncome(month);// 入金確認済みならnull以外
    const autoIncome=haisoIncome[month]||0;
    const manualIncome=incomes[month]||0;
    const deliveryIncome=nichihoIncome!==null?nichihoIncome:autoIncome>0?autoIncome:manualIncome;
    const incomeSource=nichihoIncome!==null?'confirmed':autoIncome>0?'haiso':'manual';
    const boothIncome=getBoothIncome(month);// BOOTH売上（入金確認済みのみ）
    const mIncome=deliveryIncome+boothIncome;
    const net=mIncome-mDed;
    yearIncome+=mIncome;
    yearExp+=mDed;

    const card=mk('div','card');
    card.style.marginBottom='8px';

    // 月ヘッダー
    const mh=mk('div','');
    mh.style.cssText='padding:10px 14px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);';
    mh.innerHTML=`<span style="font-size:14px;font-weight:700;color:var(--text)">${parseInt(month.slice(5))}月</span>${mIncome>0?`<span style="font-size:13px;font-weight:700;color:${net>=0?'var(--green)':'var(--red)'}">手残り ${net>=0?'+':''}¥${net.toLocaleString()}</span>`:'<span style="font-size:12px;color:var(--text3)">売上未入力</span>'}`;

    // 売上行
    const ir=mk('div','srow');
    ir.innerHTML=`<div><div class="srlbl">💰 売上</div>${autoIncome>0?`<div class="srsub" style="color:var(--accent2)">haisonikkoから自動取得</div>`:'<div class="srsub">手動入力</div>'}</div>`;
    if(incomeSource==='confirmed'){
      ir.querySelector('.srlbl').textContent='💰 売上（請求額・税込）';
      ir.querySelector('.srsub').textContent='✅ 入金確認済み';ir.querySelector('.srsub').style.color='var(--green)';

// ── EXCEL インポート ──
function impExcel(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){alert('データが見つかりませんでした');return;}

      // ヘッダー行を検出
      const headers=rows[0].map(h=>String(h).trim());
      const dataRows=rows.slice(1).filter(r=>r.some(v=>v!==''));

      // 列インデックスを自動検出
      function findCol(...keywords){return headers.findIndex(h=>keywords.some(k=>h.includes(k)));}
      const colDate =findCol('日付','date','年月日','DATE');
      const colAmt  =findCol('金額','amount','支出','費用','AMT');
      const colCat  =findCol('カテゴリ','category','種別','科目','分類');
      const colMemo =findCol('メモ','memo','備考','摘要','MEMO');

      if(colDate<0||colAmt<0){
        alert('「日付」と「金額」の列が見つかりませんでした。\nヘッダー行に「日付」「金額」の文字を含む列が必要です。');
        return;
      }

      // カテゴリキー変換
      function guessCat(str){
        const s=String(str||'');
        if(/ガソリン|給油|燃料/i.test(s))return'gas';
        if(/高速|ETC|etc|有料道路/i.test(s))return'etc';
        if(/駐車/i.test(s))return'parking';
        if(/車両|修理|オイル|タイヤ|整備|部品/i.test(s))return'vehicle';
        if(/通信|スマホ|携帯|電話/i.test(s))return'phone';
        if(/ローン|利息|利子/i.test(s))return'loan';
        if(/固定資産税/i.test(s))return'ftax';
        if(/火災|保険/i.test(s))return'finsure';
        return'other';
      }

      // 日付を YYYY-MM-DD に変換
      function parseDate(v){
        if(!v)return null;
        if(v instanceof Date){const y=v.getFullYear(),m=String(v.getMonth()+1).padStart(2,'0'),d=String(v.getDate()).padStart(2,'0');return`${y}-${m}-${d}`;}
        const s=String(v).replace(/[年\/]/g,'-').replace(/[月日]/g,'').trim();
        const m=/(\d{4})-?(\d{1,2})-?(\d{1,2})/.exec(s);
        if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
        // Excel シリアル値（数値）の場合
        if(!isNaN(v)){const d=XLSX.SSF.parse_date_code(Number(v));if(d)return`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
        return null;
      }

      // プレビューデータ作成
      const preview=[];
      dataRows.forEach(row=>{
        const date=parseDate(row[colDate]);
        const amount=parseInt(String(row[colAmt]).replace(/[,，￥¥\s]/g,''));
        if(!date||!amount||amount<=0)return;
        const catRaw=colCat>=0?row[colCat]:'';
        const cat=guessCat(catRaw);
        const memo=colMemo>=0?String(row[colMemo]||''):'';
        preview.push({date,amount,cat,memo,_catRaw:String(catRaw)});
      });

      if(!preview.length){alert('有効な行（日付＋金額）が見つかりませんでした');return;}
      showExcelPreview(preview);
    }catch(err){alert('読み込みエラー: '+err.message);}
  };
  r.readAsArrayBuffer(file);
  e.target.value='';
}

  const ov=document.createElement('div');

        ${selectOpts}
      </select>
      ${row.memo?`<div style="font-size:11px;color:#8b949e;margin-top:4px;">📝 ${row.memo}</div>`:''}
    </div>`;
  });

  html+=`<div style="display:flex;gap:8px;margin-top:6px;">

  ov.innerHTML=html;
  window.xlsRows=rows;
  window.xlsOverlay=ov;
  document.body.appendChild(ov);
}

function calcLoanPayment(payNum){
  const{financeCharge:fc,numPayments:n}=loanCfg;
  if(!fc||!n)return 0;
  const base=Math.round(fc/n);
  // 最終回は端数調整
  return payNum===n?fc-base*(n-1):base;
}
function currentPayNum(){
  if(!loanCfg.startYearMonth)return null;
  const[sy,sm]=loanCfg.startYearMonth.split('-').map(Number);
  const[cy,cm]=curMonth.split('-').map(Number);
  const diff=(cy-sy)*12+(cm-sm)+1;
  if(diff<1||diff>loanCfg.numPayments)return null;
  return diff;
}

  const{totalRepayment:tr,financeCharge:fc,numPayments:n,firstPayment:fp,monthlyPayment:mp}=loanCfg;

function dl(blob,name){
  // haisonikkoと同じ実装
  if(navigator.share&&navigator.canShare){
    var file=new File([blob],name,{type:blob.type});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:name}).catch(function(){});
      return;
    }
  }
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  URL.revokeObjectURL(a.href);
}

      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:#e6edf3;">📋 ${name}</div>
      <div style="font-size:12px;color:#f59e0b;margin-bottom:10px;">全選択してコピー → メモ帳などに貼り付けて保存してください</div>
      <textarea readonly style="width:100%;height:200px;background:#0d1117;border:1px solid #2d333b;color:#e6edf3;padding:10px;border-radius:8px;font-size:11px;font-family:monospace;" onclick="this.select()">${reader.result}</textarea>
      <button onclick="this.closest('div').parentElement.remove()" style="margin-top:12px;width:100%;padding:13px;background:#2d333b;border:none;border-radius:9px;color:#8b949e;font-size:14px;cursor:pointer;">閉じる</button>
    </div>`;
    document.body.appendChild(ov);
    setTimeout(()=>ov.querySelector('textarea').select(),100);
  };
  reader.readAsText(blob);
}

function mk(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}
function mbtn(t,fn){const b=document.createElement('button');b.textContent=t;b.className='mbtn';b.onclick=fn;return b;}
function slbl(t,purple){return mk('div','slabel'+(purple?' purple':''),t);}
function emptyEl(icon,text){const d=mk('div','empty');d.innerHTML=`<div class="empty-icon">${icon}</div><div class="empty-text">${text}</div>`;return d;}
function srow(label,onclick){const d=mk('div','srow');d.innerHTML=`<div class="srlbl">${label}</div>`;d.style.cursor='pointer';d.onclick=onclick;return d;}

// ── START ──
initYear();buildChips();render();
</script>
</body>
</html>
